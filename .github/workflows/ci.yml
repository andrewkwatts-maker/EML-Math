name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # Add Rust setup since your project has a Rust backend
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install build tools
        # Adding maturin here ensures it is available for the editable install
        run: pip install --upgrade pip maturin
        
      - name: Install library with dev deps
        # This will now trigger the Rust compilation automatically
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --tb=short -m "not slow and not gemini"